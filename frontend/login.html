<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン - タスク管理</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .auth-container {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08), 0 0 0 1px #e5e5e5;
      width: 100%;
      max-width: 400px;
      padding: 40px 36px;
    }
    .auth-title { font-size: 1.4rem; font-weight: 700; margin-bottom: 8px; }
    .auth-sub   { color: #888; font-size: 0.9rem; margin-bottom: 28px; }
    .field      { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
    .field label { font-size: 0.85rem; font-weight: 500; color: #555; }
    .field input {
      padding: 11px 14px; border: 2px solid #e0e0e0; border-radius: 8px;
      font-size: 1rem; font-family: inherit; outline: none; transition: border-color 0.2s;
    }
    .field input:focus { border-color: #111; }
    .btn-full { width: 100%; margin-top: 8px; padding: 13px; font-size: 1rem; }
    .auth-switch { text-align: center; margin-top: 20px; font-size: 0.9rem; color: #888; }
    .auth-switch a { color: #111; font-weight: 500; text-decoration: none; }
    .error-msg { color: #e53e3e; font-size: 0.85rem; margin-top: 8px; display: none; }
  </style>
</head>
<body>
  <div class="auth-container">
    <h1 class="auth-title">📝 タスク管理</h1>

    <!-- ログインフォーム -->
    <div id="login-view">
      <p class="auth-sub">アカウントにログイン</p>
      <form id="login-form">
        <div class="field">
          <label>メールアドレス</label>
          <input type="email" id="login-email" placeholder="you@example.com" required>
        </div>
        <div class="field">
          <label>パスワード</label>
          <input type="password" id="login-password" placeholder="••••••••" required>
        </div>
        <p class="error-msg" id="login-error"></p>
        <button type="submit" class="btn btn-primary btn-full">ログイン</button>
      </form>
      <p class="auth-switch">アカウントがない方は <a href="#" id="to-register">新規登録</a></p>
    </div>

    <!-- 新規登録フォーム -->
    <div id="register-view" style="display:none">
      <p class="auth-sub">新しいアカウントを作成</p>
      <form id="register-form">
        <div class="field">
          <label>メールアドレス</label>
          <input type="email" id="reg-email" placeholder="you@example.com" required>
        </div>
        <div class="field">
          <label>パスワード</label>
          <input type="password" id="reg-password" placeholder="8文字以上" required minlength="8">
        </div>
        <p class="error-msg" id="register-error"></p>
        <button type="submit" class="btn btn-primary btn-full">登録する</button>
      </form>
      <p class="auth-switch">すでにアカウントをお持ちの方は <a href="#" id="to-login">ログイン</a></p>
    </div>
  </div>

  <script>
    const API = 'http://localhost:3001';

    // ビュー切り替え
    document.getElementById('to-register').addEventListener('click', e => {
      e.preventDefault();
      document.getElementById('login-view').style.display    = 'none';
      document.getElementById('register-view').style.display = 'block';
    });
    document.getElementById('to-login').addEventListener('click', e => {
      e.preventDefault();
      document.getElementById('register-view').style.display = 'none';
      document.getElementById('login-view').style.display    = 'block';
    });

    // ログイン
    document.getElementById('login-form').addEventListener('submit', async e => {
      e.preventDefault();
      const email    = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;
      const errEl    = document.getElementById('login-error');

      const res  = await fetch(`${API}/auth/login`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ email, password }),
      });
      const data = await res.json();

      if (!res.ok) {
        errEl.textContent = data.error;
        errEl.style.display = 'block';
        return;
      }

      // トークンとメールをブラウザに保存
      localStorage.setItem('token', data.token);
      localStorage.setItem('email', data.email);
      location.href = 'index.html'; // アプリへ移動
    });

    // 新規登録
    document.getElementById('register-form').addEventListener('submit', async e => {
      e.preventDefault();
      const email    = document.getElementById('reg-email').value;
      const password = document.getElementById('reg-password').value;
      const errEl    = document.getElementById('register-error');

      const res  = await fetch(`${API}/auth/register`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ email, password }),
      });
      const data = await res.json();

      if (!res.ok) {
        errEl.textContent = data.error;
        errEl.style.display = 'block';
        return;
      }

      localStorage.setItem('token', data.token);
      localStorage.setItem('email', data.email);
      location.href = 'index.html';
    });
  </script>
</body>
</html>
